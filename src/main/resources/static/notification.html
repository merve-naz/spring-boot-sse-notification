<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SSE Demo</title>

    <!-- Basit UI için Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h3 class="mb-4">📡 Canlı Bildirimler</h3>

    <div class="card shadow">
        <div class="card-body">
            <ul id="messages" class="list-group"></ul>
        </div>
    </div>
</div>

<script>
    // URL'den user al (?user=merve)
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user');

    if (!userId) {
        alert("Lütfen URL sonuna ?user=isminiz ekleyin!");
    }

    // Backend'e bağlan (dinamik)
    const eventSource = new EventSource(`http://localhost:8080/notifications/subscribe/${userId}`);

    // Tüm eventleri aynı UI ile gösteriyoruz (tasarım değişmedi!)

    eventSource.addEventListener("MESSAGE", function (event) {
        addMessage(event.data);
    });

    eventSource.addEventListener("PRIVATE_MESSAGE", function (event) {
        addMessage(event.data);
    });

    eventSource.addEventListener("INIT", function (event) {
        addMessage(event.data);
    });

    // hata takibi
    eventSource.onerror = function (err) {
        console.error("SSE hatası:", err);
    };

    // aynı eski fonksiyon (HIÇ DEĞİŞMEDİ)
    function addMessage(message) {
        const li = document.createElement("li");
        li.className = "list-group-item";
        li.textContent = message;

        document.getElementById("messages").prepend(li);
    }
</script>

</body>
</html>
